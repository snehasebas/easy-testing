<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docket Agent Tester</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      background: #0c0c0c;
      border-bottom: 1px solid #1a1a1a;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .toolbar-brand {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .toolbar-brand svg { color: #f472b6; width: 18px; height: 18px; }
    .toolbar-brand-text { font-size: 14px; font-weight: 700; color: #fff; }
    .toolbar-brand-text span { color: #f472b6; }
    .sep { width: 1px; height: 24px; background: #262626; flex-shrink: 0; }

    select, .text-input {
      padding: 6px 10px;
      background: #141414;
      border: 1px solid #262626;
      border-radius: 5px;
      color: #e5e5e5;
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }
    select {
      padding-right: 26px;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%23525252' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 8px center;
    }
    select option { background: #141414; color: #e5e5e5; }
    .text-input {
      font-family: "SF Mono", Monaco, "Courier New", monospace;
      width: 260px;
    }
    select:focus, .text-input:focus { border-color: #f472b6; }
    .text-input::placeholder { color: #404040; }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .btn-go { background: #f472b6; color: #0c0c0c; }
    .btn-go:hover { background: #f9a8d4; }
    .btn-reset { background: transparent; border: 1px solid #dc2626; color: #ef4444; }
    .btn-reset:hover { background: rgba(220, 38, 38, 0.1); }

    .env-toggle {
      display: flex;
      background: #141414;
      border-radius: 5px;
      padding: 2px;
      border: 1px solid #262626;
    }
    .env-btn {
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: transparent;
      border: none;
      border-radius: 3px;
      color: #525252;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .env-btn.active { background: #262626; color: #fff; }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: #525252;
      margin-left: auto;
      flex-shrink: 0;
    }
    .status .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #10b981; box-shadow: 0 0 6px #10b981;
      animation: pulse 2s ease-in-out infinite;
    }
    .status code { color: #a3a3a3; font-size: 10px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .main iframe {
      flex: 1;
      border: none;
      background: #111;
    }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #333;
      text-align: center;
      gap: 8px;
    }
    .empty svg { color: #262626; margin-bottom: 8px; }
    .empty p { font-size: 14px; color: #525252; }
    .empty small { font-size: 12px; }

    /* Feedback fab */
    .fab {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 9999;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #f472b6;
      color: #0c0c0c;
      border: none;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(244, 114, 182, 0.3);
      transition: transform 0.15s;
    }
    .fab:hover { transform: scale(1.08); }

    /* Feedback panel */
    .fb-panel {
      position: fixed;
      bottom: 72px;
      left: 20px;
      z-index: 9999;
      width: 360px;
      background: #0c0c0c;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }
    .fb-panel.open { display: flex; }
    .fb-title { font-size: 13px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 6px; }
    .fb-meta { font-size: 11px; color: #525252; line-height: 1.6; }
    .fb-meta code { color: #a3a3a3; background: #1a1a1a; padding: 1px 5px; border-radius: 3px; font-size: 10px; }
    .fb-id-row { display: flex; flex-direction: column; gap: 4px; }
    .fb-id-label { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; color: #525252; text-transform: uppercase; }
    .fb-id-input {
      width: 100%; padding: 8px 10px;
      background: #141414; border: 1px solid #262626; border-radius: 6px;
      color: #e5e5e5; font-size: 11px;
      font-family: "SF Mono", Monaco, "Courier New", monospace;
      outline: none;
    }
    .fb-id-input:focus { border-color: #f472b6; }
    .fb-id-input::placeholder { color: #333; }
    .fb-id-input.has-value { border-color: #10b981; background: rgba(16, 185, 129, 0.03); }
    .fb-textarea {
      width: 100%; min-height: 80px; padding: 10px;
      background: #141414; border: 1px solid #262626; border-radius: 8px;
      color: #e5e5e5; font-size: 12px; font-family: inherit;
      line-height: 1.5; resize: vertical; outline: none;
    }
    .fb-textarea:focus { border-color: #f472b6; }
    .fb-textarea::placeholder { color: #404040; }
    .fb-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel { background: #1a1a1a; color: #737373; border: none; }
    .btn-slack { background: #fff; color: #0c0c0c; }
    .btn-slack:hover { background: #e5e5e5; }
    .btn-slack.sent { background: #10b981; color: #fff; }
    .btn-slack.error { background: #ef4444; color: #fff; }

    /* Toast */
    .toast {
      position: fixed; top: 52px; right: 16px;
      padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 500;
      z-index: 10000; opacity: 0; transform: translateY(-8px);
      transition: all 0.3s ease; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #10b981; color: #fff; }
    .toast.error { background: #ef4444; color: #fff; }
    .toast.info { background: #262626; color: #e5e5e5; border: 1px solid #404040; }
  </style>
</head>
<body>

  <div id="toast" class="toast"></div>

  <!-- ── Toolbar ── -->
  <div class="toolbar">
    <div class="toolbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <div class="toolbar-brand-text">Docket <span>Tester</span></div>
    </div>

    <div class="sep"></div>

    <select id="agentSelect">
      <option value="">-- Saved agents --</option>
    </select>
    <input type="text" id="agentInput" class="text-input" placeholder="Paste agent_id...">
    <button class="btn btn-go" onclick="loadAgent()">Load</button>
    <button class="btn btn-reset" id="resetBtn" onclick="resetChat()" style="display:none">Reset</button>

    <div class="sep"></div>

    <div class="env-toggle">
      <button class="env-btn active" data-env="app" onclick="switchEnv('app')">App</button>
      <button class="env-btn" data-env="dev" onclick="switchEnv('dev')">Dev</button>
    </div>

    <div class="status" id="statusPill" style="display:none">
      <div class="dot"></div>
      <code id="statusAgentId"></code>
    </div>
  </div>

  <!-- ── Main area: iframe or empty state ── -->
  <div class="main" id="main">
    <div class="empty" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Select an agent and click <strong>Load</strong></p>
      <small>The agent will load full-screen below the toolbar</small>
    </div>
  </div>

  <!-- ── Feedback fab ── -->
  <button class="fab" id="fab" onclick="toggleFeedback()" title="Send feedback to Slack">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>

  <!-- ── Feedback panel ── -->
  <div class="fb-panel" id="fbPanel">
    <div class="fb-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
      Send Feedback to Slack
    </div>
    <div class="fb-meta" id="fbMeta"></div>
    <div class="fb-id-row">
      <label class="fb-id-label">Conversation ID</label>
      <input type="text" id="fbConvId" class="fb-id-input" placeholder="Paste conversation_id from extension...">
    </div>
    <div class="fb-id-row">
      <label class="fb-id-label">Visitor ID</label>
      <input type="text" id="fbVisitorId" class="fb-id-input" placeholder="Paste visitor_id from extension...">
    </div>
    <textarea id="fbText" class="fb-textarea" placeholder="Describe the issue or feedback..."></textarea>
    <div class="fb-actions">
      <button class="btn btn-cancel" onclick="toggleFeedback()">Cancel</button>
      <button id="slackBtn" class="btn btn-slack" onclick="sendToSlack()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        Send to Slack
      </button>
    </div>
  </div>

  <script>
    // ─── Config ──────────────────────────────────────────────────────
    var SAVED_AGENTS = [
      { name: 'Default Test Agent', id: '1b81b9ed-ce6a-4b73-9f71-94cc0a9c4ab0' },
    ];
    var AGENT_BASE_URL = 'https://aiseller.dev.docketai.com';
    var SLACK_API_PATH = '/api/slack';
    var PORTKEY_ORG_IDS = {
      app: '0501e7ad-fe7d-4304-a2b3-9d3a73176fcf',
      dev: 'd89a67c9-a650-4107-bad4-c3d3cd7641cb',
    };
    var KIBANA_CONFIG = {
      dev: { baseUrl: 'https://logging.dev.docketai.com', dataViewId: '49b05873-fec8-43d1-a5b7-222746f7aa66' },
      app: { baseUrl: 'https://logging.app.docketai.com', dataViewId: 'fec2389e-a11f-483b-8522-7f6491a7109c' },
    };

    // ─── State ───────────────────────────────────────────────────────
    var currentAgentId = null;
    var currentEnv = 'app';
    var detectedConvId = null;
    var detectedVisitorId = null;

    // ─── Listen for postMessage from Docket iframe ───────────────────
    window.addEventListener('message', function(e) {
      if (!e.data || typeof e.data !== 'object') return;
      var d = e.data;
      var cid = d.conversation_id || d.conversationId || (d.data && (d.data.conversation_id || d.data.conversationId));
      var vid = d.visitor_id || d.visitorId || (d.data && d.data.visitor && d.data.visitor.id) || (d.visitor && d.visitor.id);
      if (cid) {
        detectedConvId = cid;
        var el = document.getElementById('fbConvId');
        if (el && !el.value) { el.value = cid; el.classList.add('has-value'); }
      }
      if (vid) {
        detectedVisitorId = vid;
        var el = document.getElementById('fbVisitorId');
        if (el && !el.value) { el.value = vid; el.classList.add('has-value'); }
      }
    });

    // ─── Init ────────────────────────────────────────────────────────
    (function init() {
      var select = document.getElementById('agentSelect');
      SAVED_AGENTS.forEach(function(a) {
        var opt = document.createElement('option');
        opt.value = a.id;
        opt.textContent = a.name + '  (' + a.id.slice(0, 8) + '…)';
        select.appendChild(opt);
      });
      select.addEventListener('change', function() {
        if (select.value) document.getElementById('agentInput').value = select.value;
      });

      var params = new URLSearchParams(window.location.search);
      var envFromUrl = params.get('env');
      if (envFromUrl) {
        currentEnv = envFromUrl;
        document.querySelectorAll('.env-btn').forEach(function(b) {
          b.classList.toggle('active', b.dataset.env === currentEnv);
        });
      }

      var agentFromUrl = params.get('agent');
      if (agentFromUrl) showAgent(agentFromUrl);
    })();

    // ─── Show agent (full-page iframe) ───────────────────────────────
    function showAgent(agentId) {
      currentAgentId = agentId;
      document.getElementById('agentInput').value = agentId;

      var match = SAVED_AGENTS.find(function(a) { return a.id === agentId; });
      if (match) document.getElementById('agentSelect').value = agentId;

      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('resetBtn').style.display = 'inline-flex';
      document.getElementById('fab').style.display = 'flex';
      document.getElementById('statusPill').style.display = 'flex';
      document.getElementById('statusAgentId').textContent = agentId;

      var old = document.getElementById('agentFrame');
      if (old) old.remove();

      var iframe = document.createElement('iframe');
      iframe.id = 'agentFrame';
      iframe.src = AGENT_BASE_URL + '/' + agentId + '/';
      iframe.loading = 'lazy';
      iframe.allow = 'microphone';
      iframe.allowFullscreen = true;
      document.getElementById('main').appendChild(iframe);

      var url = new URL(window.location.origin + window.location.pathname);
      url.searchParams.set('agent', agentId);
      url.searchParams.set('env', currentEnv);
      history.replaceState(null, '', url.toString());
    }

    // ─── Load Agent ──────────────────────────────────────────────────
    function loadAgent() {
      var agentId = document.getElementById('agentInput').value.trim() || document.getElementById('agentSelect').value;
      if (!agentId) { toast('Please select or enter an agent ID', 'error'); return; }
      showAgent(agentId);
      toast('Agent loaded', 'success');
    }

    // ─── Reset Chat (reload iframe for fresh session) ────────────────
    function resetChat() {
      if (!currentAgentId) return;
      var iframe = document.getElementById('agentFrame');
      if (iframe) iframe.src = AGENT_BASE_URL + '/' + currentAgentId + '/?t=' + Date.now();
      toast('Chat reset — fresh session', 'success');
    }

    // ─── Environment toggle ──────────────────────────────────────────
    function switchEnv(env) {
      currentEnv = env;
      document.querySelectorAll('.env-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.env === env);
      });
      var url = new URL(window.location.href);
      url.searchParams.set('env', env);
      history.replaceState(null, '', url.toString());
      toast('Environment: ' + env.toUpperCase(), 'info');
    }

    // ─── Feedback ────────────────────────────────────────────────────
    function toggleFeedback() {
      var panel = document.getElementById('fbPanel');
      var isOpen = panel.classList.toggle('open');
      if (isOpen) {
        updateMeta();
        // Pre-fill with detected IDs if fields are empty
        var convEl = document.getElementById('fbConvId');
        var visEl = document.getElementById('fbVisitorId');
        if (detectedConvId && !convEl.value) { convEl.value = detectedConvId; convEl.classList.add('has-value'); }
        if (detectedVisitorId && !visEl.value) { visEl.value = detectedVisitorId; visEl.classList.add('has-value'); }
        document.getElementById('fbText').focus();
      }
    }

    // Toggle green border on ID inputs
    document.addEventListener('input', function(e) {
      if (e.target.classList && e.target.classList.contains('fb-id-input')) {
        e.target.classList.toggle('has-value', !!e.target.value.trim());
      }
    });

    function updateMeta() {
      var label = (SAVED_AGENTS.find(function(a) { return a.id === currentAgentId; }) || {}).name || 'Custom';
      document.getElementById('fbMeta').innerHTML =
        '<b>Agent:</b> ' + label +
        '<br><b>ID:</b> <code>' + (currentAgentId || 'N/A') + '</code>' +
        '<br><b>Env:</b> ' + currentEnv.toUpperCase();
    }

    function buildPortkeyUrl(cid) {
      if (!cid) return null;
      var orgId = PORTKEY_ORG_IDS[currentEnv];
      var now = new Date();
      var dr = JSON.stringify({ startDate: new Date(now.getTime() - 30*86400000).toISOString(), endDate: now.toISOString(), placeHolder: 'Last 30 days' });
      return 'https://app.portkey.ai/organisation/' + orgId + '/logs?traceView=true&dateRange=' + encodeURIComponent(dr) + '&traceId=' + cid + '&selectedTraceId=' + cid;
    }

    function buildKibanaUrl(cid) {
      if (!cid) return null;
      var c = KIBANA_CONFIG[currentEnv];
      var q = 'msg%20:%20%22' + cid + '%22';
      var g = "(filters:!(),refreshInterval:(pause:!t,value:60000),time:(from:now-30d%2Fd,to:now))";
      var a = "(columns:!(msg),dataSource:(dataViewId:'" + c.dataViewId + "',type:dataView),filters:!(),hideChart:!f,interval:auto,query:(language:kuery,query:'" + q + "'),rowsPerPage:500,sort:!(!('@timestamp',asc)))";
      return c.baseUrl + '/app/discover#/?_g=' + g + '&_a=' + a;
    }

    // ─── Send to Slack via serverless proxy ──────────────────────────
    async function sendToSlack() {
      var btn = document.getElementById('slackBtn');
      var textarea = document.getElementById('fbText');
      var comment = textarea.value.trim();
      if (!comment) { toast('Please add a comment', 'error'); return; }
      if (!currentAgentId) { toast('No agent loaded', 'error'); return; }

      var convId = document.getElementById('fbConvId').value.trim();
      var visitorId = document.getElementById('fbVisitorId').value.trim();
      var now = new Date();
      var label = (SAVED_AGENTS.find(function(a) { return a.id === currentAgentId; }) || {}).name || 'Custom';

      var blocks = [
        { type: 'header', text: { type: 'plain_text', text: 'Agent Test Feedback', emoji: true } },
        { type: 'section', fields: [
            { type: 'mrkdwn', text: '*Conversation ID:*\n`' + (convId || 'N/A') + '`' },
            { type: 'mrkdwn', text: '*Visitor ID:*\n`' + (visitorId || 'N/A') + '`' },
            { type: 'mrkdwn', text: '*Environment:*\n' + currentEnv.toUpperCase() },
            { type: 'mrkdwn', text: '*Time:*\n' + now.toLocaleString() },
        ]},
        { type: 'section', fields: [
            { type: 'mrkdwn', text: '*Agent:*\n' + label + '\n`' + currentAgentId + '`' },
            { type: 'mrkdwn', text: '*Standalone:*\n<' + AGENT_BASE_URL + '/' + currentAgentId + '|Open Agent>' },
        ]},
        { type: 'section', text: { type: 'mrkdwn', text: '*Comment:*\n' + comment } },
      ];

      if (convId) {
        var pkUrl = buildPortkeyUrl(convId);
        var kbUrl = buildKibanaUrl(convId);
        var actionElements = [];
        if (pkUrl) actionElements.push({ type: 'button', text: { type: 'plain_text', text: 'Portkey Logs' }, url: pkUrl });
        if (kbUrl) actionElements.push({ type: 'button', text: { type: 'plain_text', text: 'Kibana Logs' }, url: kbUrl });
        if (actionElements.length) blocks.push({ type: 'actions', elements: actionElements });
      }

      blocks.push({ type: 'context', elements: [{ type: 'mrkdwn', text: 'Sent from Docket Agent Tester' }] });

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        var resp = await fetch(SLACK_API_PATH, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ blocks: blocks }),
        });
        var result = await resp.json();
        if (!resp.ok) throw new Error(result.error || 'Status ' + resp.status);
        btn.classList.add('sent');
        btn.textContent = 'Sent!';
        textarea.value = '';
        toast('Feedback sent to Slack', 'success');
      } catch (err) {
        btn.classList.add('error');
        btn.textContent = 'Failed';
        toast('Failed: ' + err.message, 'error');
      }

      setTimeout(function() {
        btn.classList.remove('sent', 'error');
        btn.disabled = false;
        btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send to Slack';
      }, 2500);
    }

    function toast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type + ' show';
      setTimeout(function() { t.classList.remove('show'); }, 2500);
    }
  </script>
</body>
</html>
