<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docket Agent Tester</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111;
      color: #e5e5e5;
      min-height: 100vh;
    }

    .toolbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      background: #0c0c0c;
      border-bottom: 1px solid #1a1a1a;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toolbar-brand { display: flex; align-items: center; gap: 8px; margin-right: 4px; flex-shrink: 0; }
    .toolbar-brand svg { color: #f472b6; }
    .toolbar-brand-text { font-size: 15px; font-weight: 700; color: #fff; }
    .toolbar-brand-text span { color: #f472b6; }
    .toolbar-sep { width: 1px; height: 28px; background: #262626; flex-shrink: 0; }

    .agent-select {
      padding: 7px 30px 7px 10px;
      background: #141414; border: 1px solid #262626; border-radius: 6px;
      color: #e5e5e5; font-size: 12px; font-family: inherit; cursor: pointer; outline: none;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%23525252' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 8px center;
    }
    .agent-select:focus { border-color: #f472b6; }
    .agent-select option { background: #141414; color: #e5e5e5; }

    .agent-input {
      padding: 7px 10px; background: #141414; border: 1px solid #262626; border-radius: 6px;
      color: #e5e5e5; font-size: 12px; font-family: "SF Mono", Monaco, "Courier New", monospace;
      width: 280px; outline: none;
    }
    .agent-input::placeholder { color: #404040; }
    .agent-input:focus { border-color: #f472b6; }

    .btn {
      padding: 7px 14px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .btn-primary { background: #f472b6; color: #0c0c0c; }
    .btn-primary:hover { background: #f9a8d4; }
    .btn-danger { background: transparent; border: 1px solid #dc2626; color: #ef4444; }
    .btn-danger:hover { background: rgba(220, 38, 38, 0.1); }

    .env-toggle { display: flex; background: #141414; border-radius: 6px; padding: 2px; border: 1px solid #262626; }
    .env-btn {
      padding: 5px 12px; font-size: 11px; font-weight: 500; background: transparent;
      border: none; border-radius: 4px; color: #525252; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .env-btn.active { background: #262626; color: #fff; }

    .status-pill {
      display: flex; align-items: center; gap: 6px; font-size: 11px; color: #525252;
      margin-left: auto; flex-shrink: 0;
    }
    .status-pill .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #10b981; box-shadow: 0 0 6px #10b981;
      animation: pulse 2s ease-in-out infinite;
    }
    .status-pill code { color: #a3a3a3; font-size: 10px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .page-body { padding-top: 56px; min-height: 100vh; }
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: calc(100vh - 56px); color: #404040; text-align: center; gap: 8px;
    }
    .empty-state p { font-size: 14px; }
    .empty-state small { font-size: 12px; color: #333; }

    .feedback-toggle {
      position: fixed; bottom: 20px; left: 20px; z-index: 9999;
      width: 44px; height: 44px; border-radius: 50%;
      background: #f472b6; color: #0c0c0c; border: none; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(244, 114, 182, 0.3); transition: transform 0.15s;
    }
    .feedback-toggle:hover { transform: scale(1.08); }

    .feedback-panel {
      position: fixed; bottom: 76px; left: 20px; z-index: 9999;
      width: 340px; background: #0c0c0c; border: 1px solid #262626;
      border-radius: 12px; padding: 16px;
      display: none; flex-direction: column; gap: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    .feedback-panel.open { display: flex; }
    .feedback-title { font-size: 13px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 6px; }
    .feedback-meta { font-size: 11px; color: #525252; line-height: 1.5; }
    .feedback-meta code { color: #a3a3a3; background: #1a1a1a; padding: 1px 5px; border-radius: 3px; font-size: 10px; }
    .feedback-textarea {
      width: 100%; min-height: 80px; padding: 10px 12px;
      background: #141414; border: 1px solid #262626; border-radius: 8px;
      color: #e5e5e5; font-size: 12px; font-family: inherit;
      line-height: 1.5; resize: vertical; outline: none;
    }
    .feedback-textarea:focus { border-color: #f472b6; }
    .feedback-textarea::placeholder { color: #404040; }
    .feedback-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-slack { background: #fff; color: #0c0c0c; }
    .btn-slack:hover { background: #e5e5e5; }
    .btn-slack.sent { background: #10b981; color: #fff; }
    .btn-slack.error { background: #ef4444; color: #fff; }

    .toast {
      position: fixed; top: 60px; right: 20px;
      padding: 10px 18px; border-radius: 8px; font-size: 12px; font-weight: 500;
      z-index: 10000; opacity: 0; transform: translateY(-8px);
      transition: all 0.3s ease; pointer-events: none;
    }
    .toast.visible { opacity: 1; transform: translateY(0); }
    .toast.success { background: #10b981; color: #fff; }
    .toast.error { background: #ef4444; color: #fff; }
    .toast.info { background: #262626; color: #e5e5e5; border: 1px solid #404040; }
  </style>
</head>
<body>

  <div id="toast" class="toast"></div>

  <div class="toolbar">
    <div class="toolbar-brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <div class="toolbar-brand-text">Docket <span>Tester</span></div>
    </div>
    <div class="toolbar-sep"></div>
    <select id="agentSelect" class="agent-select">
      <option value="">-- Saved agents --</option>
    </select>
    <input type="text" id="agentInput" class="agent-input" placeholder="Paste agent_id here...">
    <button class="btn btn-primary" onclick="loadAgent()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Load Agent
    </button>
    <button class="btn btn-danger" id="resetBtn" onclick="resetChat()" style="display:none">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Reset Chat
    </button>
    <div class="toolbar-sep"></div>
    <div class="env-toggle">
      <button class="env-btn active" data-env="app" onclick="switchEnv('app')">App</button>
      <button class="env-btn" data-env="dev" onclick="switchEnv('dev')">Dev</button>
    </div>
    <div class="status-pill" id="statusPill" style="display:none">
      <div class="dot"></div>
      <span>Agent:</span>
      <code id="statusAgentId"></code>
    </div>
  </div>

  <div class="page-body">
    <div class="empty-state" id="emptyState">
      <p>Select an agent above and click <strong>Load Agent</strong></p>
      <small>The Docket chat widget will appear on this page</small>
    </div>
  </div>

  <button class="feedback-toggle" id="feedbackToggle" onclick="toggleFeedback()" title="Send feedback to Slack">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
  </button>

  <div class="feedback-panel" id="feedbackPanel">
    <div class="feedback-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
      Send Feedback to Slack
    </div>
    <div class="feedback-meta" id="feedbackMeta"></div>
    <textarea id="feedbackText" class="feedback-textarea" placeholder="Describe the issue or feedback..."></textarea>
    <div class="feedback-actions">
      <button class="btn" style="background:#1a1a1a;color:#737373" onclick="toggleFeedback()">Cancel</button>
      <button id="slackBtn" class="btn btn-slack" onclick="sendToSlack()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        Send to Slack
      </button>
    </div>
  </div>

  <!--
    SCRIPT 1: Set window.AISellerSettings from the URL param.
    Runs BEFORE the widget snippet, just like on a real website.
  -->
  <script>
    (function() {
      var agentId = new URLSearchParams(window.location.search).get('agent');
      if (agentId) {
        window.AISellerSettings = { agent_id: agentId };
      }
    })();
  </script>

  <!--
    SCRIPT 2: The EXACT Docket widget snippet (verbatim).
    Only runs if AISellerSettings exists (i.e. agent was selected).
    Placed at end of body as Docket docs specify.
  -->
  <script>
    if (window.AISellerSettings) {
      (function () {
        var w = window;
        var ew = w.AISeller;
        if (typeof ew === 'function') {
          ew('update', w.AISellerSettings);
        } else {
          var d = document;
          var i = function () {
            i.q.push(arguments);
          };
          i.q = [];
          i.q.push(['update', w.AISellerSettings]);
          w.AISeller = i;
          var l = function () {
            var s = d.createElement('script');
            s.type = 'text/javascript';
            s.async = true;
            s.src = 'https://d33t2173eag6fx.cloudfront.net/script/dev/inbound-se-script/ai-seller.js';
            var x = d.getElementsByTagName('script')[0];
            x.parentNode.insertBefore(s, x);
          };
          if (document.readyState === 'complete') {
            l();
          } else if (w.attachEvent) {
            w.attachEvent('onload', l);
          } else {
            w.addEventListener('load', l, false);
          }
        }
      })();
    }
  </script>

  <!-- SCRIPT 3: Toolbar UI logic, Slack feedback -->
  <script>
    var SAVED_AGENTS = [
      { name: 'Default Test Agent', id: '1b81b9ed-ce6a-4b73-9f71-94cc0a9c4ab0' },
      // { name: 'Client Name', id: 'their-agent-id-here' },
    ];

    var SLACK_WEBHOOK_URL = 'https://hooks.slack.com/services/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';
    var PORTKEY_ORG_IDS = {
      app: '0501e7ad-fe7d-4304-a2b3-9d3a73176fcf',
      dev: 'd89a67c9-a650-4107-bad4-c3d3cd7641cb',
    };
    var KIBANA_CONFIG = {
      dev: { baseUrl: 'https://logging.dev.docketai.com', dataViewId: '49b05873-fec8-43d1-a5b7-222746f7aa66' },
      app: { baseUrl: 'https://logging.app.docketai.com', dataViewId: 'fec2389e-a11f-483b-8522-7f6491a7109c' },
    };

    var params = new URLSearchParams(window.location.search);
    var currentAgentId = params.get('agent') || null;
    var currentEnv = params.get('env') || 'app';

    // ─── Init ────────────────────────────────────────────────────────
    (function init() {
      var select = document.getElementById('agentSelect');
      SAVED_AGENTS.forEach(function(a) {
        var opt = document.createElement('option');
        opt.value = a.id;
        opt.textContent = a.name + '  (' + a.id.slice(0, 8) + '...)';
        select.appendChild(opt);
      });
      select.addEventListener('change', function() {
        if (select.value) document.getElementById('agentInput').value = select.value;
      });

      document.querySelectorAll('.env-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.env === currentEnv);
      });

      if (currentAgentId) {
        document.getElementById('agentInput').value = currentAgentId;
        var match = SAVED_AGENTS.find(function(a) { return a.id === currentAgentId; });
        if (match) select.value = currentAgentId;
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('resetBtn').style.display = 'inline-flex';
        document.getElementById('feedbackToggle').style.display = 'flex';
        document.getElementById('statusPill').style.display = 'flex';
        document.getElementById('statusAgentId').textContent = currentAgentId;
      }
    })();

    // ─── Load Agent: clear everything, navigate with ?agent= ─────────
    function loadAgent() {
      var input = document.getElementById('agentInput');
      var select = document.getElementById('agentSelect');
      var agentId = input.value.trim() || select.value;
      if (!agentId) { showToast('Please select or enter an agent ID', 'error'); return; }
      localStorage.clear();
      var url = new URL(window.location.origin + window.location.pathname);
      url.searchParams.set('agent', agentId);
      url.searchParams.set('env', currentEnv);
      window.location.href = url.toString();
    }

    // ─── Reset Chat: clear localStorage, full reload ─────────────────
    function resetChat() {
      if (!currentAgentId) { showToast('No agent loaded', 'error'); return; }
      localStorage.clear();
      window.location.reload();
    }

    function switchEnv(env) {
      currentEnv = env;
      document.querySelectorAll('.env-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.env === env);
      });
      var url = new URL(window.location.href);
      url.searchParams.set('env', env);
      history.replaceState(null, '', url.toString());
      showToast('Environment: ' + env.toUpperCase(), 'info');
    }

    // ─── Feedback ────────────────────────────────────────────────────
    function toggleFeedback() {
      var panel = document.getElementById('feedbackPanel');
      var isOpen = panel.classList.toggle('open');
      if (isOpen) {
        updateFeedbackMeta();
        document.getElementById('feedbackText').focus();
      }
    }

    function updateFeedbackMeta() {
      var data = extractConversationData();
      var agentLabel = (SAVED_AGENTS.find(function(a) { return a.id === currentAgentId; }) || {}).name || 'Custom';
      document.getElementById('feedbackMeta').innerHTML =
        '<b>Agent:</b> ' + agentLabel + ' &middot; <b>Env:</b> ' + currentEnv.toUpperCase() +
        (data.conversationId ? '<br><b>Conv:</b> <code>' + data.conversationId + '</code>' : '') +
        (data.visitorId ? '<br><b>Visitor:</b> <code>' + data.visitorId + '</code>' : '');
    }

    function extractConversationData() {
      var result = { conversationId: null, visitorId: null };
      for (var idx = 0; idx < localStorage.length; idx++) {
        var key = localStorage.key(idx);
        var val = localStorage.getItem(key) || '';
        if (/conversation.?id/i.test(key)) { result.conversationId = val.replace(/"/g, ''); continue; }
        if (/visitor.?id/i.test(key)) { result.visitorId = val.replace(/"/g, ''); continue; }
        try {
          var p = JSON.parse(val);
          if (p && typeof p === 'object') {
            var cid = p.conversation_id || p.conversationId || (p.data && p.data.conversation_id);
            var vid = p.visitor_id || p.visitorId || (p.visitor && p.visitor.id) || (p.data && p.data.visitor && p.data.visitor.id);
            if (cid) result.conversationId = cid;
            if (vid) result.visitorId = vid;
          }
        } catch (e) {}
      }
      return result;
    }

    function buildPortkeyUrl(cid) {
      if (!cid) return null;
      var orgId = PORTKEY_ORG_IDS[currentEnv];
      var now = new Date();
      var dr = JSON.stringify({ startDate: new Date(now.getTime() - 30*86400000).toISOString(), endDate: now.toISOString(), placeHolder: 'Last 30 days' });
      return 'https://app.portkey.ai/organisation/' + orgId + '/logs?traceView=true&dateRange=' + encodeURIComponent(dr) + '&traceId=' + cid + '&selectedTraceId=' + cid;
    }

    function buildKibanaUrl(cid) {
      if (!cid) return null;
      var c = KIBANA_CONFIG[currentEnv];
      var q = 'msg%20:%20%22' + cid + '%22';
      var g = "(filters:!(),refreshInterval:(pause:!t,value:60000),time:(from:now-30d%2Fd,to:now))";
      var a = "(columns:!(msg),dataSource:(dataViewId:'" + c.dataViewId + "',type:dataView),filters:!(),hideChart:!f,interval:auto,query:(language:kuery,query:'" + q + "'),rowsPerPage:500,sort:!(!('@timestamp',asc)))";
      return c.baseUrl + '/app/discover#/?_g=' + g + '&_a=' + a;
    }

    // ─── Slack: uses no-cors + form-encoded to bypass CORS ───────────
    async function sendToSlack() {
      var btn = document.getElementById('slackBtn');
      var textarea = document.getElementById('feedbackText');
      var comment = textarea.value.trim();
      if (!comment) { showToast('Please add a comment', 'error'); return; }
      if (!currentAgentId) { showToast('No agent loaded', 'error'); return; }

      var data = extractConversationData();
      var now = new Date();
      var agentLabel = (SAVED_AGENTS.find(function(a) { return a.id === currentAgentId; }) || {}).name || 'Custom';

      var blocks = [
        { type: 'header', text: { type: 'plain_text', text: '🧪 Agent Test Feedback', emoji: true } },
        { type: 'section', fields: [
            { type: 'mrkdwn', text: '*Agent:*\n' + agentLabel + '\n`' + currentAgentId + '`' },
            { type: 'mrkdwn', text: '*Environment:*\n' + currentEnv.toUpperCase() },
            { type: 'mrkdwn', text: '*Conversation ID:*\n`' + (data.conversationId || 'N/A') + '`' },
            { type: 'mrkdwn', text: '*Visitor ID:*\n`' + (data.visitorId || 'N/A') + '`' },
        ]},
        { type: 'section', text: { type: 'mrkdwn', text: '*Comment:*\n' + comment } },
        { type: 'context', elements: [{ type: 'mrkdwn', text: 'Sent from Docket Agent Tester · ' + now.toLocaleString() }] },
      ];

      if (data.conversationId) {
        var elements = [];
        var pk = buildPortkeyUrl(data.conversationId);
        var kb = buildKibanaUrl(data.conversationId);
        if (pk) elements.push({ type: 'button', text: { type: 'plain_text', text: 'Portkey Logs' }, url: pk });
        if (kb) elements.push({ type: 'button', text: { type: 'plain_text', text: 'Kibana Logs' }, url: kb });
        if (elements.length) blocks.push({ type: 'actions', elements: elements });
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        // Slack webhooks don't support CORS from browsers.
        // Use mode: 'no-cors' with form-encoded payload to bypass preflight.
        // The request is sent but the response is opaque (can't read status).
        await fetch(SLACK_WEBHOOK_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'payload=' + encodeURIComponent(JSON.stringify({ blocks: blocks })),
        });

        // With no-cors we can't verify the response, but if fetch didn't throw
        // a network error the request was sent successfully
        btn.classList.add('sent');
        btn.textContent = '✓ Sent';
        textarea.value = '';
        showToast('Feedback sent to Slack', 'success');
      } catch (err) {
        btn.classList.add('error');
        btn.textContent = 'Failed';
        showToast('Network error sending to Slack', 'error');
      }

      setTimeout(function() {
        btn.classList.remove('sent', 'error');
        btn.disabled = false;
        btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send to Slack';
      }, 2500);
    }

    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type + ' visible';
      setTimeout(function() { t.classList.remove('visible'); }, 2500);
    }
  </script>
</body>
</html>
