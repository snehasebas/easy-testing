<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docket Agent Tester</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a; color: #e5e5e5; height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }

    .toolbar {
      background: #0c0c0c; border-bottom: 1px solid #1a1a1a; padding: 8px 16px;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .toolbar-brand { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .toolbar-brand svg { color: #f472b6; width: 18px; height: 18px; }
    .toolbar-brand-text { font-size: 14px; font-weight: 700; color: #fff; }
    .toolbar-brand-text span { color: #f472b6; }
    .sep { width: 1px; height: 24px; background: #262626; flex-shrink: 0; }
    select, .text-input {
      padding: 6px 10px; background: #141414; border: 1px solid #262626;
      border-radius: 5px; color: #e5e5e5; font-size: 12px; font-family: inherit; outline: none;
    }
    select {
      padding-right: 26px; cursor: pointer; appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%23525252' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 8px center;
    }
    select option { background: #141414; color: #e5e5e5; }
    .text-input { font-family: "SF Mono", Monaco, "Courier New", monospace; width: 260px; }
    select:focus, .text-input:focus { border-color: #f472b6; }
    .text-input::placeholder { color: #404040; }
    .btn {
      padding: 6px 12px; border: none; border-radius: 5px; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;
    }
    .btn-go { background: #f472b6; color: #0c0c0c; }
    .btn-go:hover { background: #f9a8d4; }
    .btn-reset { background: transparent; border: 1px solid #dc2626; color: #ef4444; }
    .btn-reset:hover { background: rgba(220, 38, 38, 0.1); }
    .env-toggle { display: flex; background: #141414; border-radius: 5px; padding: 2px; border: 1px solid #262626; }
    .env-btn {
      padding: 4px 10px; font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; background: transparent; border: none; border-radius: 3px;
      color: #525252; cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .env-btn.active { background: #262626; color: #fff; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #525252; margin-left: auto; flex-shrink: 0; }
    .status .dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; box-shadow: 0 0 6px #10b981; animation: pulse 2s ease-in-out infinite; }
    .status code { color: #a3a3a3; font-size: 10px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .ids-bar {
      display: none; background: #0c0c0c; border-top: 1px solid #1a1a1a;
      padding: 6px 16px; gap: 12px; align-items: center; flex-shrink: 0; flex-wrap: wrap;
    }
    .ids-bar.visible { display: flex; }
    .id-chip { display: flex; align-items: center; gap: 6px; font-size: 11px; cursor: pointer; padding: 3px 6px; border-radius: 4px; transition: background 0.15s; }
    .id-chip:hover { background: #1a1a1a; }
    .id-chip-label { color: #525252; font-weight: 600; text-transform: uppercase; font-size: 9px; letter-spacing: 0.05em; }
    .id-chip-value { color: #a3a3a3; font-family: "SF Mono", Monaco, monospace; font-size: 11px; }
    .id-chip-value.waiting { color: #404040; font-style: italic; font-family: inherit; }
    .id-chip.copied .id-chip-value { color: #10b981; }
    .link-btn { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; border: none; cursor: pointer; font-family: inherit; }
    .link-btn.disabled { opacity: 0.3; pointer-events: none; }
    .link-portkey { background: #fff; color: #0c0c0c; }
    .link-kibana { background: #f472b6; color: #0c0c0c; }

    .main { flex: 1; position: relative; overflow: hidden; }
    .empty { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; text-align: center; gap: 8px; }
    .empty svg { color: #262626; margin-bottom: 8px; }
    .empty p { font-size: 14px; color: #525252; }
    .empty small { font-size: 12px; }

    .fab { position: fixed; bottom: 20px; left: 20px; z-index: 9999; width: 42px; height: 42px; border-radius: 50%; background: #f472b6; color: #0c0c0c; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(244,114,182,0.3); transition: transform 0.15s; }
    .fab:hover { transform: scale(1.08); }
    .fb-panel { position: fixed; bottom: 72px; left: 20px; z-index: 9999; width: 380px; background: #0c0c0c; border: 1px solid #262626; border-radius: 12px; padding: 16px; display: none; flex-direction: column; gap: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
    .fb-panel.open { display: flex; }
    .fb-title { font-size: 13px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 6px; }
    .fb-meta { font-size: 11px; color: #525252; line-height: 1.6; }
    .fb-meta code { color: #a3a3a3; background: #1a1a1a; padding: 1px 5px; border-radius: 3px; font-size: 10px; }
    .fb-textarea { width: 100%; min-height: 80px; padding: 10px; background: #141414; border: 1px solid #262626; border-radius: 8px; color: #e5e5e5; font-size: 12px; font-family: inherit; line-height: 1.5; resize: vertical; outline: none; }
    .fb-textarea:focus { border-color: #f472b6; }
    .fb-textarea::placeholder { color: #404040; }
    .fb-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel { background: #1a1a1a; color: #737373; border: none; }
    .btn-slack { background: #fff; color: #0c0c0c; }
    .btn-slack:hover { background: #e5e5e5; }
    .btn-slack.sent { background: #10b981; color: #fff; }
    .btn-slack.error { background: #ef4444; color: #fff; }
    .toast { position: fixed; top: 52px; right: 16px; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 500; z-index: 10000; opacity: 0; transform: translateY(-8px); transition: all 0.3s ease; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #10b981; color: #fff; }
    .toast.error { background: #ef4444; color: #fff; }
    .toast.info { background: #262626; color: #e5e5e5; border: 1px solid #404040; }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>

  <div class="toolbar">
    <div class="toolbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <div class="toolbar-brand-text">Docket <span>Tester</span></div>
    </div>
    <div class="sep"></div>
    <select id="agentSelect"><option value="">-- Saved agents --</option></select>
    <input type="text" id="agentInput" class="text-input" placeholder="Paste agent_id...">
    <button class="btn btn-go" onclick="loadAgent()">Load</button>
    <button class="btn btn-go" style="background:#262626;color:#e5e5e5" onclick="openStandalone()" title="Open in Docket's hosted page (no whitelisting needed)">Standalone</button>
    <button class="btn btn-reset" id="resetBtn" onclick="resetChat()" style="display:none">Reset Chat</button>
    <div class="sep"></div>
    <div class="env-toggle">
      <button class="env-btn active" data-env="app" onclick="switchEnv('app')">App</button>
      <button class="env-btn" data-env="dev" onclick="switchEnv('dev')">Dev</button>
    </div>
    <div class="status" id="statusPill" style="display:none"><div class="dot"></div><code id="statusAgentId"></code></div>
  </div>

  <div class="ids-bar" id="idsBar">
    <div class="id-chip" id="convChip" onclick="copyId('conv')" title="Click to copy">
      <span class="id-chip-label">Conv</span>
      <span class="id-chip-value waiting" id="convValue">waiting for chat...</span>
    </div>
    <div class="id-chip" id="visChip" onclick="copyId('vis')" title="Click to copy">
      <span class="id-chip-label">Visitor</span>
      <span class="id-chip-value waiting" id="visValue">waiting...</span>
    </div>
    <div class="sep"></div>
    <a class="link-btn link-portkey disabled" id="portkeyLink" target="_blank">Portkey</a>
    <a class="link-btn link-kibana disabled" id="kibanaLink" target="_blank">Kibana</a>
  </div>

  <div class="main" id="main">
    <div class="empty" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>Select an agent and click <strong>Load</strong></p>
      <small>The Docket chat widget will appear on this page</small>
    </div>
  </div>

  <button class="fab" id="fab" onclick="toggleFeedback()" title="Send feedback to Slack">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>

  <div class="fb-panel" id="fbPanel">
    <div class="fb-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Send Feedback to Slack
    </div>
    <div class="fb-meta" id="fbMeta"></div>
    <textarea id="fbText" class="fb-textarea" placeholder="Describe the issue or feedback..."></textarea>
    <div class="fb-actions">
      <button class="btn btn-cancel" onclick="toggleFeedback()">Cancel</button>
      <button id="slackBtn" class="btn btn-slack" onclick="sendToSlack()">Send to Slack</button>
    </div>
  </div>

  <!-- SCRIPT 1: Passive fetch observer — captures IDs from Docket API responses (same pattern as Dext-Debugger extension's intercept.ts) -->
  <script>
    (function() {
      var _origFetch = window.fetch;
      window.__docketIds = { convId: null, visitorId: null };

      window.fetch = function() {
        var args = arguments;
        var responsePromise = _origFetch.apply(this, args);

        var url = typeof args[0] === 'string' ? args[0] : (args[0] && args[0].url ? args[0].url : '');
        if (url.indexOf('docketai.com') === -1) return responsePromise;

        responsePromise.then(function(resp) {
          if (url.indexOf('/init') !== -1 || url.indexOf('/conversations') !== -1) {
            resp.clone().json().then(function(data) {
              if (url.indexOf('/init') !== -1) {
                var vid = (data.data && data.data.visitor && data.data.visitor.id) || (data.visitor && data.visitor.id);
                if (vid) window.__docketIds.visitorId = vid;
              }
              if (url.indexOf('/conversations') !== -1) {
                var cid = (data.data && data.data.conversation_id) || data.conversation_id;
                if (cid) window.__docketIds.convId = cid;
              }
            }).catch(function(){});
          }
        }).catch(function(){});

        return responsePromise;
      };
    })();
  </script>

  <!-- SCRIPT 2+3: Docket embed — always loads. Dynamic agent_id from URL, falls back to default. Loader code is verbatim from Docket settings. -->
  <script>
    window.AISellerSettings = {
      agent_id: new URLSearchParams(window.location.search).get('agent') || '1b81b9ed-ce6a-4b73-9f71-94cc0a9c4ab0',
    };

    (function () {
      var w = window;
      var ew = w.AISeller;
      if (typeof ew === 'function') {
        ew('update', w.AISellerSettings);
      } else {
        var d = document;
        var i = function () {
          i.q.push(arguments);
        };
        i.q = [];
        i.q.push(['update', w.AISellerSettings]);
        w.AISeller = i;
        var l = function () {
          var s = d.createElement('script');
          s.type = 'text/javascript';
          s.async = true;
          s.src = 'https://d33t2173eag6fx.cloudfront.net/script/dev/inbound-se-script/ai-seller.js';
          var x = d.getElementsByTagName('script')[0];
          x.parentNode.insertBefore(s, x);
        };
        if (document.readyState === 'complete') {
          l();
        } else if (w.attachEvent) {
          w.attachEvent('onload', l);
        } else {
          w.addEventListener('load', l, false);
        }
      }
    })();
  </script>

  <!-- SCRIPT 4: App logic -->
  <script>
    var SAVED_AGENTS = [
      { name: 'Default Test Agent', id: '1b81b9ed-ce6a-4b73-9f71-94cc0a9c4ab0' },
    ];
    var SLACK_API_PATH = '/api/slack';
    var PORTKEY_ORG_IDS = { app: '0501e7ad-fe7d-4304-a2b3-9d3a73176fcf', dev: 'd89a67c9-a650-4107-bad4-c3d3cd7641cb' };
    var KIBANA_CONFIG = {
      dev: { baseUrl: 'https://logging.dev.docketai.com', dataViewId: '49b05873-fec8-43d1-a5b7-222746f7aa66' },
      app: { baseUrl: 'https://logging.app.docketai.com', dataViewId: 'fec2389e-a11f-483b-8522-7f6491a7109c' },
    };

    var DEFAULT_AGENT_ID = '1b81b9ed-ce6a-4b73-9f71-94cc0a9c4ab0';
    var params = new URLSearchParams(window.location.search);
    var currentAgentId = params.get('agent') || DEFAULT_AGENT_ID;
    var currentEnv = params.get('env') || 'app';
    var detectedConvId = null;
    var detectedVisitorId = null;

    (function init() {
      var select = document.getElementById('agentSelect');
      SAVED_AGENTS.forEach(function(a) {
        var opt = document.createElement('option');
        opt.value = a.id;
        opt.textContent = a.name + '  (' + a.id.slice(0, 8) + '…)';
        select.appendChild(opt);
      });
      select.addEventListener('change', function() {
        if (select.value) document.getElementById('agentInput').value = select.value;
      });
      document.querySelectorAll('.env-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.env === currentEnv);
      });

      document.getElementById('agentInput').value = currentAgentId;
      var match = SAVED_AGENTS.find(function(a) { return a.id === currentAgentId; });
      if (match) select.value = currentAgentId;
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('resetBtn').style.display = 'inline-flex';
      document.getElementById('fab').style.display = 'flex';
      document.getElementById('statusPill').style.display = 'flex';
      document.getElementById('statusAgentId').textContent = currentAgentId;
      document.getElementById('idsBar').classList.add('visible');
      startPolling();
    })();

    function loadAgent() {
      var agentId = document.getElementById('agentInput').value.trim() || document.getElementById('agentSelect').value;
      if (!agentId) { toast('Please select or enter an agent ID', 'error'); return; }
      localStorage.clear();
      var url = new URL(window.location.origin + window.location.pathname);
      url.searchParams.set('agent', agentId);
      url.searchParams.set('env', currentEnv);
      window.location.href = url.toString();
    }

    function openStandalone() {
      var agentId = document.getElementById('agentInput').value.trim() || document.getElementById('agentSelect').value || currentAgentId;
      if (!agentId) { toast('Please select or enter an agent ID', 'error'); return; }
      var env = currentEnv === 'app' ? 'app' : 'dev';
      window.open('https://aiseller.' + env + '.docketai.com/' + agentId + '/', '_blank');
    }

    function resetChat() {
      if (!currentAgentId) return;
      localStorage.clear();
      window.location.reload();
    }

    function switchEnv(env) {
      currentEnv = env;
      document.querySelectorAll('.env-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.env === env); });
      var url = new URL(window.location.href);
      url.searchParams.set('env', env);
      history.replaceState(null, '', url.toString());
      updateLinks();
      toast('Environment: ' + env.toUpperCase(), 'info');
    }

    function startPolling() {
      poll();
      setInterval(poll, 2000);
    }

    function poll() {
      var ids = window.__docketIds || {};
      var lsData = extractFromLocalStorage();
      var cid = ids.convId || lsData.conversationId;
      var vid = ids.visitorId || lsData.visitorId;

      if (cid && cid !== detectedConvId) {
        detectedConvId = cid;
        var el = document.getElementById('convValue');
        el.textContent = cid;
        el.classList.remove('waiting');
      }
      if (vid && vid !== detectedVisitorId) {
        detectedVisitorId = vid;
        var el = document.getElementById('visValue');
        el.textContent = vid;
        el.classList.remove('waiting');
      }
      updateLinks();
    }

    function extractFromLocalStorage() {
      var result = { conversationId: null, visitorId: null };
      for (var idx = 0; idx < localStorage.length; idx++) {
        var key = localStorage.key(idx);
        var val = localStorage.getItem(key) || '';
        if (/conversation.?id/i.test(key)) { result.conversationId = val.replace(/"/g, ''); continue; }
        if (/visitor.?id/i.test(key)) { result.visitorId = val.replace(/"/g, ''); continue; }
        try {
          var p = JSON.parse(val);
          if (p && typeof p === 'object') {
            var cid = p.conversation_id || p.conversationId || (p.data && p.data.conversation_id);
            var vid = p.visitor_id || p.visitorId || (p.visitor && p.visitor.id) || (p.data && p.data.visitor && p.data.visitor.id);
            if (cid) result.conversationId = cid;
            if (vid) result.visitorId = vid;
          }
        } catch (e) {}
      }
      return result;
    }

    function updateLinks() {
      var pk = document.getElementById('portkeyLink');
      var kb = document.getElementById('kibanaLink');
      if (detectedConvId) {
        pk.href = buildPortkeyUrl(detectedConvId); pk.classList.remove('disabled');
        kb.href = buildKibanaUrl(detectedConvId); kb.classList.remove('disabled');
      } else { pk.classList.add('disabled'); kb.classList.add('disabled'); }
    }

    function buildPortkeyUrl(cid) {
      var orgId = PORTKEY_ORG_IDS[currentEnv]; var now = new Date();
      var dr = JSON.stringify({ startDate: new Date(now.getTime() - 30*86400000).toISOString(), endDate: now.toISOString(), placeHolder: 'Last 30 days' });
      return 'https://app.portkey.ai/organisation/' + orgId + '/logs?traceView=true&dateRange=' + encodeURIComponent(dr) + '&traceId=' + cid + '&selectedTraceId=' + cid;
    }

    function buildKibanaUrl(cid) {
      var c = KIBANA_CONFIG[currentEnv];
      var q = 'msg%20:%20%22' + cid + '%22';
      var g = "(filters:!(),refreshInterval:(pause:!t,value:60000),time:(from:now-30d%2Fd,to:now))";
      var a = "(columns:!(msg),dataSource:(dataViewId:'" + c.dataViewId + "',type:dataView),filters:!(),hideChart:!f,interval:auto,query:(language:kuery,query:'" + q + "'),rowsPerPage:500,sort:!(!('@timestamp',asc)))";
      return c.baseUrl + '/app/discover#/?_g=' + g + '&_a=' + a;
    }

    function copyId(type) {
      var val = type === 'conv' ? detectedConvId : detectedVisitorId;
      if (!val) return;
      navigator.clipboard.writeText(val);
      var chip = document.getElementById(type === 'conv' ? 'convChip' : 'visChip');
      chip.classList.add('copied');
      setTimeout(function() { chip.classList.remove('copied'); }, 1500);
      toast('Copied!', 'success');
    }

    function toggleFeedback() {
      var panel = document.getElementById('fbPanel');
      var isOpen = panel.classList.toggle('open');
      if (isOpen) { updateFeedbackMeta(); document.getElementById('fbText').focus(); }
    }

    function updateFeedbackMeta() {
      var label = (SAVED_AGENTS.find(function(a) { return a.id === currentAgentId; }) || {}).name || 'Custom';
      var html = '<b>Agent:</b> ' + label + ' &middot; <b>Env:</b> ' + currentEnv.toUpperCase();
      if (detectedConvId) html += '<br><b>Conv:</b> <code>' + detectedConvId + '</code>';
      if (detectedVisitorId) html += '<br><b>Visitor:</b> <code>' + detectedVisitorId + '</code>';
      if (!detectedConvId && !detectedVisitorId) html += '<br><span style="color:#404040">Chat with the agent to capture IDs</span>';
      document.getElementById('fbMeta').innerHTML = html;
    }

    async function sendToSlack() {
      var btn = document.getElementById('slackBtn');
      var textarea = document.getElementById('fbText');
      var comment = textarea.value.trim();
      if (!comment) { toast('Please add a comment', 'error'); return; }
      if (!currentAgentId) { toast('No agent loaded', 'error'); return; }

      var now = new Date();
      var label = (SAVED_AGENTS.find(function(a) { return a.id === currentAgentId; }) || {}).name || 'Custom';
      var convIdDisplay = detectedConvId || 'N/A';
      var visIdDisplay = detectedVisitorId || 'N/A';
      var portkeyUrl = detectedConvId ? buildPortkeyUrl(detectedConvId) : 'https://app.portkey.ai/';
      var kibanaUrl = detectedConvId ? buildKibanaUrl(detectedConvId) : KIBANA_CONFIG[currentEnv].baseUrl;

      var blocks = [
        { type: 'header', text: { type: 'plain_text', text: 'Agent Test Feedback', emoji: true } },
        { type: 'section', fields: [
          { type: 'mrkdwn', text: '*Conversation ID:*\n`' + convIdDisplay + '`' },
          { type: 'mrkdwn', text: '*Visitor ID:*\n`' + visIdDisplay + '`' },
          { type: 'mrkdwn', text: '*Environment:*\n' + currentEnv.toUpperCase() },
          { type: 'mrkdwn', text: '*Time:*\n' + now.toLocaleString() },
        ]},
        { type: 'section', fields: [
          { type: 'mrkdwn', text: '*Agent:*\n' + label + '\n`' + currentAgentId + '`' },
          { type: 'mrkdwn', text: '*Standalone:*\n<https://aiseller.dev.docketai.com/' + currentAgentId + '|Open Agent>' },
        ]},
        { type: 'section', text: { type: 'mrkdwn', text: '*Comment:*\n' + comment } },
        { type: 'actions', elements: [
          { type: 'button', text: { type: 'plain_text', text: 'Portkey Logs' }, url: portkeyUrl },
          { type: 'button', text: { type: 'plain_text', text: 'Kibana Logs' }, url: kibanaUrl },
        ]},
        { type: 'context', elements: [{ type: 'mrkdwn', text: 'Sent from Docket Agent Tester' }] },
      ];

      btn.disabled = true; btn.textContent = 'Sending...';
      try {
        var resp = await fetch(SLACK_API_PATH, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ blocks: blocks }) });
        var result = await resp.json();
        if (!resp.ok) throw new Error(result.error || 'Status ' + resp.status);
        btn.classList.add('sent'); btn.textContent = 'Sent!'; textarea.value = '';
        toast('Feedback sent to Slack', 'success');
      } catch (err) {
        btn.classList.add('error'); btn.textContent = 'Failed';
        toast('Failed: ' + err.message, 'error');
      }
      setTimeout(function() { btn.classList.remove('sent', 'error'); btn.disabled = false; btn.textContent = 'Send to Slack'; }, 2500);
    }

    function toast(msg, type) {
      var t = document.getElementById('toast'); t.textContent = msg;
      t.className = 'toast ' + type + ' show';
      setTimeout(function() { t.classList.remove('show'); }, 2500);
    }
  </script>
</body>
</html>
